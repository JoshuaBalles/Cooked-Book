<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooked-Book</title>
    <link rel="stylesheet" href="/static/css/output.css">
</head>
<body class="bg-white min-h-screen">
    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div class="bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span id="toast-message" class="text-sm font-medium"></span>
        </div>
    </div>

    <!-- Header -->
    <header class="border-b border-gray-200 bg-white sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="back-btn" onclick="showGrid()" class="hidden text-gray-600 hover:text-gray-900">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="text-2xl font-semibold text-gray-900 tracking-tight">Cooked-Book</h1>
            </div>
            <button onclick="openModal()" class="bg-gray-900 text-white px-4 py-2 text-sm font-medium hover:bg-gray-700 transition-colors duration-200">
                + New Recipe
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- Recipe Grid View -->
        <div id="recipe-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Recipes will be loaded here -->
        </div>
        
        <!-- Recipe Detail View -->
        <div id="recipe-detail" class="hidden max-w-2xl mx-auto">
            <!-- Recipe detail will be shown here -->
        </div>
        
        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-16">
            <p class="text-gray-400 text-lg">No recipes yet. Create your first one!</p>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-gray-900/50 hidden z-20" onclick="closeModalOnOverlay(event)">
        <!-- Modal -->
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white w-full max-w-lg shadow-xl" onclick="event.stopPropagation()">
                <!-- Modal Header -->
                <div class="border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                    <h2 id="modal-title" class="text-lg font-semibold text-gray-900">New Recipe</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Modal Form -->
                <form id="recipe-form" class="p-6 space-y-4" onsubmit="submitRecipe(event)">
                    <input type="hidden" id="recipe-id">
                    
                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Recipe Name</label>
                        <input type="text" id="title" required
                            class="w-full px-3 py-2 border border-gray-300 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
                            placeholder="Enter recipe name">
                    </div>
                    
                    <div>
                        <label for="ingredients" class="block text-sm font-medium text-gray-700 mb-1">Ingredients</label>
                        <textarea id="ingredients" required rows="3"
                            class="w-full px-3 py-2 border border-gray-300 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent resize-none"
                            placeholder="List ingredients (one per line)"></textarea>
                    </div>
                    
                    <div>
                        <label for="instructions" class="block text-sm font-medium text-gray-700 mb-1">Instructions</label>
                        <textarea id="instructions" required rows="4"
                            class="w-full px-3 py-2 border border-gray-300 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent resize-none"
                            placeholder="Enter cooking instructions"></textarea>
                    </div>
                    
                    <!-- Modal Actions -->
                    <div class="flex justify-end gap-3 pt-2">
                        <button type="button" onclick="closeModal()"
                            class="px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 hover:bg-gray-50 transition-colors duration-200">
                            Cancel
                        </button>
                        <button type="submit"
                            class="px-4 py-2 text-sm font-medium text-white bg-gray-900 hover:bg-gray-700 transition-colors duration-200">
                            Save Recipe
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-gray-900/50 hidden z-30">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white w-full max-w-sm shadow-xl p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-2">Delete Recipe?</h3>
                <p class="text-gray-600 text-sm mb-4">This action cannot be undone.</p>
                <div class="flex justify-end gap-3">
                    <button onclick="closeDeleteModal()"
                        class="px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button onclick="confirmDelete()"
                        class="px-4 py-2 text-sm font-medium text-white bg-gray-900 hover:bg-gray-700 transition-colors">
                        Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let recipes = [];
        let recipeToDelete = null;

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 4000);
        }

        // Load recipes on page load
        document.addEventListener('DOMContentLoaded', loadRecipes);

        async function loadRecipes() {
            try {
                console.log('Fetching recipes from /recipes/...');
                const response = await fetch('/recipes/');
                console.log('Response status:', response.status);
                if (!response.ok) {
                    const text = await response.text();
                    console.error('Response error:', text);
                    throw new Error('Failed to load recipes');
                }
                recipes = await response.json();
                console.log('Loaded recipes:', recipes);
                renderRecipes();
            } catch (error) {
                console.error('Error loading recipes:', error);
                showToast('Failed to load recipes: ' + error.message);
            }
        }

        function renderRecipes() {
            const grid = document.getElementById('recipe-grid');
            const emptyState = document.getElementById('empty-state');
            
            if (recipes.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            
            grid.innerHTML = recipes.map(recipe => `
                <article onclick="viewRecipe(${recipe.id})" 
                    class="border border-gray-200 bg-white hover:shadow-lg transition-all duration-300 cursor-pointer group">
                    <div class="p-5">
                        <h3 class="text-lg font-semibold text-gray-900 mb-3 line-clamp-1 group-hover:text-gray-700">
                            ${escapeHtml(recipe.title)}
                        </h3>
                        <div class="mb-4">
                            <h4 class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Ingredients</h4>
                            <p class="text-sm text-gray-600 line-clamp-3">${escapeHtml(recipe.ingredients)}</p>
                        </div>
                        <div class="mb-4">
                            <h4 class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Instructions</h4>
                            <p class="text-sm text-gray-600 line-clamp-3">${escapeHtml(recipe.instructions)}</p>
                        </div>
                        <p class="text-xs text-gray-400 pt-2 border-t border-gray-100">Click to view details</p>
                    </div>
                </article>
            `).join('');
        }

        function viewRecipe(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            
            const detail = document.getElementById('recipe-detail');
            const grid = document.getElementById('recipe-grid');
            const backBtn = document.getElementById('back-btn');
            
            grid.classList.add('hidden');
            backBtn.classList.remove('hidden');
            
            detail.classList.remove('hidden');
            detail.innerHTML = `
                <div class="bg-white border border-gray-200">
                    <div class="p-6 border-b border-gray-200">
                        <h2 class="text-2xl font-semibold text-gray-900">${escapeHtml(recipe.title)}</h2>
                    </div>
                    <div class="p-6 space-y-6">
                        <div>
                            <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-2">Ingredients</h3>
                            <p class="text-gray-700 whitespace-pre-line">${escapeHtml(recipe.ingredients)}</p>
                        </div>
                        <div>
                            <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-2">Instructions</h3>
                            <p class="text-gray-700 whitespace-pre-line">${escapeHtml(recipe.instructions)}</p>
                        </div>
                    </div>
                    <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex gap-3">
                        <button onclick="editRecipe(${recipe.id})"
                            class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 bg-white hover:bg-gray-100 transition-colors">
                            Edit Recipe
                        </button>
                        <button onclick="showDeleteModal(${recipe.id})"
                            class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 bg-white hover:bg-gray-100 transition-colors">
                            Delete Recipe
                        </button>
                    </div>
                </div>
            `;
            
            // Store current recipe ID for reference
            detail.dataset.recipeId = id;
        }

        function showGrid() {
            const detail = document.getElementById('recipe-detail');
            const grid = document.getElementById('recipe-grid');
            const backBtn = document.getElementById('back-btn');
            
            detail.classList.add('hidden');
            grid.classList.remove('hidden');
            backBtn.classList.add('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Modal functions
        function openModal(recipeId = null) {
            const modal = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('recipe-form');
            
            if (recipeId) {
                const recipe = recipes.find(r => r.id === recipeId);
                if (recipe) {
                    title.textContent = 'Edit Recipe';
                    document.getElementById('recipe-id').value = recipe.id;
                    document.getElementById('title').value = recipe.title;
                    document.getElementById('ingredients').value = recipe.ingredients;
                    document.getElementById('instructions').value = recipe.instructions;
                }
            } else {
                title.textContent = 'New Recipe';
                form.reset();
                document.getElementById('recipe-id').value = '';
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        function closeModalOnOverlay(event) {
            if (event.target === event.currentTarget) {
                closeModal();
            }
        }

        function editRecipe(id) {
            openModal(id);
        }

        async function submitRecipe(event) {
            event.preventDefault();
            
            const recipeId = document.getElementById('recipe-id').value;
            const title = document.getElementById('title').value;
            const ingredients = document.getElementById('ingredients').value;
            const instructions = document.getElementById('instructions').value;
            
            const recipeData = { title, ingredients, instructions };
            
            try {
                let response;
                if (recipeId) {
                    // Update existing recipe
                    response = await fetch(`/recipes/${recipeId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(recipeData)
                    });
                } else {
                    // Create new recipe
                    response = await fetch('/recipes/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(recipeData)
                    });
                }
                
                if (response.ok) {
                    closeModal();
                    loadRecipes();
                    
                    // If we were viewing a recipe, refresh the detail view
                    const detail = document.getElementById('recipe-detail');
                    if (!detail.classList.contains('hidden') && recipeId) {
                        viewRecipe(parseInt(recipeId));
                    }
                } else {
                    showToast('Failed to save recipe. Please try again.');
                }
            } catch (error) {
                console.error('Error saving recipe:', error);
                showToast('Failed to save recipe. Please try again.');
            }
        }

        // Delete functions
        function showDeleteModal(id) {
            recipeToDelete = id;
            document.getElementById('delete-modal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            recipeToDelete = null;
            document.getElementById('delete-modal').classList.add('hidden');
        }

        async function confirmDelete() {
            if (!recipeToDelete) return;
            
            try {
                const response = await fetch(`/recipes/${recipeToDelete}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    closeDeleteModal();
                    showGrid();
                    loadRecipes();
                } else {
                    showToast('Failed to delete recipe. Please try again.');
                }
            } catch (error) {
                console.error('Error deleting recipe:', error);
                showToast('Failed to delete recipe. Please try again.');
            }
        }
    </script>
</body>
</html>
